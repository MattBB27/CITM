{% extends "base.html" %}
{% block title %}Add Vehicle{% endblock %}
{% block page_title %}Add Vehicle{% endblock %}
{% block content %}
<div style="max-width:540px">
  <div class="card">
    <div class="card-header">Add Vehicle</div>
    <div class="card-body">
      <form method="POST">
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Manufacturer *</label>
            <input name="manufacturer" class="form-control" required placeholder="e.g. Toyota">
          </div>
          <div class="form-group">
            <label class="form-label">Model *</label>
            <input name="model" class="form-control" required placeholder="e.g. Corolla">
          </div>
        </div>
        <div class="grid-2">
          <div class="form-group">
            <label class="form-label">Vehicle Type *</label>
            <select name="vehicle_type" class="form-control" required>
              <option>Sedan</option>
              <option>Hatchback</option>
              <option>SUV</option>
              <option>Ute</option>
              <option>Van</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Current Mileage (km)</label>
            <input name="mileage" type="number" class="form-control" value="0">
          </div>
        </div>
        <div class="flex gap-2">
          <button type="submit" class="btn btn-primary">Add Vehicle</button>
          <a href="{{ url_for('vehicles') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
