{% extends "base.html" %}
{% block title %}{{ action }} Customer{% endblock %}
{% block page_title %}{{ action }} Customer{% endblock %}
{% block content %}
<div style="max-width:540px">
  <div class="card">
    <div class="card-header">{{ action }} Customer</div>
    <div class="card-body">
      <form method="POST">
        <div class="form-group">
          <label class="form-label">Full Name *</label>
          <input name="name" class="form-control" required
                 value="{{ customer.name if customer else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Driver Licence Number *</label>
          <input name="driver_license_number" class="form-control" required
                 value="{{ customer.driver_license_number if customer else '' }}"
                 placeholder="e.g. NSW-DL-482910">
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input name="email" type="email" class="form-control"
                 value="{{ customer.email if customer else '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">Phone</label>
          <input name="phone" class="form-control"
                 value="{{ customer.phone if customer else '' }}">
        </div>
        <div class="flex gap-2" style="margin-top:8px">
          <button type="submit" class="btn btn-primary">{{ action }} Customer</button>
          <a href="{{ url_for('customers') }}" class="btn btn-outline">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
